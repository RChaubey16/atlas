version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: atlas-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: .
    container_name: atlas-gateway
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm run start:gateway
    environment:
      GATEWAY_PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      CONTENT_SERVICE_URL: http://content-service:3002
      URL_SHORTENER_URL: http://url-shortener:3003
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      NODE_ENV: ${NODE_ENV:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      - auth-service
      - content-service
      - url-shortener

  auth-service:
    build: .
    container_name: atlas-auth-service
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && pnpm run start:auth"
    environment:
      AUTH_SERVICE_PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/atlas?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      RABBITMQ_URL: amqp://guest:guest@atlas-rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  content-service:
    build: .
    container_name: atlas-content-service
    ports:
      - "3002:3002"
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm run start:content
    environment:
      CONTENT_SERVICE_PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/atlas?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  url-shortener:
    build: .
    container_name: atlas-url-shortener
    ports:
      - "3003:3003"
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm run start:url-shortener
    environment:
      URL_SHORTENER_PORT: 3003
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/atlas?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build: .
    container_name: atlas-notification-service
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm run start:notification
    environment:
      RABBITMQ_URL: amqp://guest:guest@atlas-rabbitmq:5672
      RESEND_API_KEY: ${RESEND_API_KEY}
      SMTP_FROM: ${SMTP_FROM}
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
